<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repertórios</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#111827; color:#f9fafb;
  font-family:Georgia,serif;
  min-height:100vh;
}

/* ── LAYOUT ── */
.layout {
  display:flex; height:100vh; overflow:hidden;
}

/* ── SIDEBAR ── */
.sidebar {
  width:260px; flex-shrink:0;
  background:#0f172a;
  border-right:1px solid rgba(255,255,255,0.07);
  display:flex; flex-direction:column;
  overflow:hidden;
}
.sidebar-header {
  padding:16px 14px 12px;
  border-bottom:1px solid rgba(255,255,255,0.07);
  flex-shrink:0;
}
.sidebar-header h1 {
  font-size:0.85rem; color:#fbbf24;
  text-transform:uppercase; letter-spacing:0.1em;
  margin-bottom:10px;
}
.btn-new {
  width:100%; padding:9px 12px;
  background:rgba(251,191,36,0.12); border:1px solid rgba(251,191,36,0.4);
  border-radius:8px; color:#fbbf24;
  font-size:0.78rem; font-family:Georgia,serif;
  font-weight:700; letter-spacing:0.05em; text-transform:uppercase;
  cursor:pointer; transition:background 0.15s;
}
.btn-new:hover { background:rgba(251,191,36,0.2); }

.rep-list {
  flex:1; overflow-y:auto; padding:8px 8px;
}
.rep-item {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 10px; border-radius:8px; cursor:pointer;
  transition:background 0.15s; gap:6px;
  border:1px solid transparent; margin-bottom:4px;
}
.rep-item:hover { background:rgba(255,255,255,0.05); }
.rep-item.active {
  background:rgba(251,191,36,0.1);
  border-color:rgba(251,191,36,0.3);
}
.rep-item-name {
  font-size:0.88rem; color:#f9fafb; flex:1;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.rep-item-count {
  font-size:0.68rem; color:#6b7280;
  font-family:'Courier New',monospace;
  flex-shrink:0;
}
.rep-item-del {
  background:none; border:none; color:#4b5563;
  cursor:pointer; padding:2px 4px; font-size:0.85rem;
  border-radius:4px; flex-shrink:0; line-height:1;
  transition:color 0.15s;
}
.rep-item-del:hover { color:#f87171; }

.sidebar-footer {
  padding:12px 14px;
  border-top:1px solid rgba(255,255,255,0.07);
  flex-shrink:0;
}
.home-link {
  display:flex; align-items:center; gap:8px;
  text-decoration:none; color:#9ca3af;
  font-size:0.78rem; font-family:'Courier New',monospace;
  transition:color 0.15s;
}
.home-link:hover { color:#fbbf24; }

/* ── PAINEL PRINCIPAL ── */
.main {
  flex:1; overflow-y:auto;
  padding:28px 5%;
  max-width:680px;
}

.empty-state {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; height:60vh;
  color:#4b5563; text-align:center; gap:12px;
}
.empty-state .icon { font-size:2.5rem; }
.empty-state p { font-size:0.88rem; line-height:1.6; max-width:240px; }

/* ── CABEÇALHO DO REPERTÓRIO ── */
.rep-header {
  display:flex; align-items:flex-start;
  justify-content:space-between; gap:12px;
  margin-bottom:20px;
}
.rep-name-wrap { flex:1; min-width:0; }
.rep-name {
  font-size:1.3rem; color:#fbbf24;
  letter-spacing:0.04em; text-transform:uppercase;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  cursor:pointer; display:flex; align-items:center; gap:8px;
}
.rep-name:hover .edit-icon { opacity:1; }
.edit-icon { font-size:0.75rem; color:#6b7280; opacity:0; transition:opacity 0.15s; }
.rep-meta { font-size:0.72rem; color:#6b7280; font-family:'Courier New',monospace; margin-top:4px; }

.btn-add-song {
  padding:9px 16px; flex-shrink:0;
  background:rgba(251,191,36,0.12); border:1px solid rgba(251,191,36,0.4);
  border-radius:8px; color:#fbbf24;
  font-size:0.78rem; font-family:Georgia,serif;
  font-weight:700; cursor:pointer; transition:background 0.15s;
  white-space:nowrap;
}
.btn-add-song:hover { background:rgba(251,191,36,0.22); }

/* ── LISTA DE MÚSICAS DO REPERTÓRIO ── */
.song-list { list-style:none; }

.song-row {
  display:flex; align-items:center; gap:10px;
  background:#1f2937; border:1px solid rgba(255,255,255,0.06);
  border-left:3px solid #fbbf24;
  border-radius:10px; padding:12px 14px;
  margin-bottom:8px;
  transition:background 0.15s, opacity 0.15s, transform 0.15s;
  cursor:default;
}
.song-row.dragging {
  opacity:0.4; transform:scale(0.98);
}
.song-row.drag-over {
  border-color:rgba(251,191,36,0.7);
  background:#263044;
  box-shadow:0 0 0 2px rgba(251,191,36,0.25);
}
.drag-handle {
  color:#374151; cursor:grab; font-size:0.9rem;
  padding:2px 4px; flex-shrink:0; line-height:1;
  transition:color 0.15s; user-select:none;
}
.drag-handle:active { cursor:grabbing; }
.song-row:hover .drag-handle { color:#6b7280; }
.song-row-num {
  font-size:0.68rem; color:#6b7280;
  font-family:'Courier New',monospace;
  width:18px; text-align:right; flex-shrink:0;
}
.song-row-info { flex:1; min-width:0; }
.song-row-title {
  font-size:0.95rem; color:#fbbf24;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  display:block; text-decoration:none;
}
.song-row-title:hover { text-decoration:underline; }
.song-row-artist {
  font-size:0.7rem; color:#9ca3af;
  font-family:'Courier New',monospace;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  margin-top:2px;
}
.song-row-key {
  font-size:0.7rem; color:#6b7280;
  font-family:'Courier New',monospace;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:6px; padding:2px 8px;
  flex-shrink:0;
}
.btn-rem {
  background:none; border:none; color:#4b5563;
  cursor:pointer; font-size:0.85rem; padding:4px;
  border-radius:4px; flex-shrink:0;
  transition:color 0.15s; line-height:1;
}
.btn-rem:hover { color:#f87171; }

.rep-empty {
  text-align:center; padding:40px 0;
  color:#4b5563; font-size:0.85rem; line-height:1.7;
}

/* ── MODAL ── */
.overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.7); z-index:200;
  align-items:center; justify-content:center;
  padding:20px;
}
.overlay.open { display:flex; }
.modal {
  background:#1f2937; border:1px solid rgba(255,255,255,0.1);
  border-radius:14px; width:100%; max-width:480px;
  max-height:80vh; display:flex; flex-direction:column;
  overflow:hidden;
}
.modal-header {
  padding:16px 18px 12px;
  border-bottom:1px solid rgba(255,255,255,0.07);
  display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0;
}
.modal-header h2 { font-size:0.95rem; color:#fbbf24; }
.modal-close {
  background:none; border:none; color:#6b7280;
  cursor:pointer; font-size:1.2rem; padding:2px 6px;
  border-radius:4px; line-height:1; transition:color 0.15s;
}
.modal-close:hover { color:#f9fafb; }
.modal-search {
  padding:10px 16px;
  border-bottom:1px solid rgba(255,255,255,0.07);
  flex-shrink:0;
}
.modal-search input {
  width:100%; padding:9px 12px;
  background:#111827; border:1px solid rgba(255,255,255,0.1);
  border-radius:8px; color:#f9fafb;
  font-size:0.88rem; font-family:Georgia,serif;
  outline:none; transition:border-color 0.2s;
}
.modal-search input:focus { border-color:rgba(251,191,36,0.4); }
.modal-search input::placeholder { color:#4b5563; }
.modal-list { overflow-y:auto; padding:8px 10px; }
.modal-song-item {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 10px; border-radius:8px;
  cursor:pointer; transition:background 0.15s; gap:10px;
  border:1px solid transparent; margin-bottom:2px;
}
.modal-song-item:hover { background:rgba(255,255,255,0.05); }
.modal-song-item.already { opacity:0.35; cursor:default; }
.modal-song-info { flex:1; min-width:0; }
.modal-song-title {
  font-size:0.88rem; color:#f9fafb;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.modal-song-artist {
  font-size:0.68rem; color:#6b7280;
  font-family:'Courier New',monospace;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  margin-top:1px;
}
.modal-song-key {
  font-size:0.68rem; color:#6b7280;
  font-family:'Courier New',monospace;
  flex-shrink:0;
}
.modal-add-btn {
  background:rgba(251,191,36,0.15); border:1px solid rgba(251,191,36,0.4);
  border-radius:6px; color:#fbbf24;
  font-size:0.7rem; font-weight:700; cursor:pointer;
  padding:4px 10px; flex-shrink:0; transition:background 0.15s;
}
.modal-add-btn:hover { background:rgba(251,191,36,0.3); }

/* ── MODAL NOME ── */
.modal-form { padding:18px; }
.modal-form label {
  display:block; font-size:0.75rem; color:#9ca3af;
  margin-bottom:6px; text-transform:uppercase; letter-spacing:0.06em;
}
.modal-form input {
  width:100%; padding:10px 14px;
  background:#111827; border:1px solid rgba(255,255,255,0.1);
  border-radius:8px; color:#f9fafb;
  font-size:0.95rem; font-family:Georgia,serif;
  outline:none; transition:border-color 0.2s; margin-bottom:14px;
}
.modal-form input:focus { border-color:rgba(251,191,36,0.5); }
.modal-form-actions { display:flex; gap:8px; justify-content:flex-end; }
.btn-cancel {
  padding:8px 16px; background:transparent;
  border:1px solid rgba(255,255,255,0.12);
  border-radius:8px; color:#9ca3af;
  font-size:0.82rem; font-family:Georgia,serif;
  cursor:pointer; transition:border-color 0.15s;
}
.btn-cancel:hover { border-color:rgba(255,255,255,0.3); }
.btn-confirm {
  padding:8px 18px;
  background:rgba(251,191,36,0.15); border:1px solid rgba(251,191,36,0.5);
  border-radius:8px; color:#fbbf24;
  font-size:0.82rem; font-family:Georgia,serif; font-weight:700;
  cursor:pointer; transition:background 0.15s;
}
.btn-confirm:hover { background:rgba(251,191,36,0.28); }

/* ── RESPONSIVO ── */
@media (max-width: 600px) {
  .sidebar { width:200px; }
  .main { padding:20px 4%; }
}
@media (max-width: 440px) {
  .layout { flex-direction:column; height:auto; }
  .sidebar { width:100%; height:auto; border-right:none; border-bottom:1px solid rgba(255,255,255,0.07); }
  .rep-list { max-height:180px; }
  .main { overflow-y:visible; }
}
</style>
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>Repertórios</h1>
      <button class="btn-new" onclick="openNewRepModal()">+ Novo repertório</button>
    </div>
    <div class="rep-list" id="repList"></div>
    <div class="sidebar-footer">
      <a class="home-link" href="index.html">← Acervo</a>
    </div>
  </aside>

  <!-- PAINEL PRINCIPAL -->
  <div class="main" id="mainPanel">
    <div class="empty-state" id="emptyState">
      <div class="icon">🎵</div>
      <p>Selecione um repertório ou crie um novo para começar.</p>
    </div>
    <div id="repDetail" style="display:none"></div>
  </div>

</div>

<!-- MODAL: criar / renomear repertório -->
<div class="overlay" id="overlayName">
  <div class="modal" style="max-height:unset">
    <div class="modal-header">
      <h2 id="modalNameTitle">Novo repertório</h2>
      <button class="modal-close" onclick="closeNameModal()">✕</button>
    </div>
    <div class="modal-form">
      <label for="repNameInput">Nome</label>
      <input type="text" id="repNameInput" placeholder="Ex: Culto Domingo" maxlength="60"
             onkeydown="if(event.key==='Enter')confirmNameModal()">
      <div class="modal-form-actions">
        <button class="btn-cancel" onclick="closeNameModal()">Cancelar</button>
        <button class="btn-confirm" onclick="confirmNameModal()">Salvar</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: adicionar músicas -->
<div class="overlay" id="overlayAdd">
  <div class="modal">
    <div class="modal-header">
      <h2>Adicionar músicas</h2>
      <button class="modal-close" onclick="closeAddModal()">✕</button>
    </div>
    <div class="modal-search">
      <input type="search" id="addSearch" placeholder="Buscar música ou artista…"
             oninput="renderAddList()" autocomplete="off">
    </div>
    <div class="modal-list" id="addList"></div>
  </div>
</div>

<script src="database/songs.js"></script>
<script>
// ── STORAGE ──────────────────────────────────────────────────────────
const STORAGE_KEY = 'cifras_repertorio';

function loadReps() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch(e) { return []; }
}

function saveReps(reps) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(reps));
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

// ── ESTADO ───────────────────────────────────────────────────────────
const SONGS = window.SONGS || [];
const songMap = {};
SONGS.forEach(s => { songMap[s.id] = s; });

let reps = loadReps();
let activeRepId = null;

// modal name state
let nameModalMode = null; // 'new' | 'rename'
let nameModalRepId = null;

// ── INIT ─────────────────────────────────────────────────────────────
renderSidebar();
if (reps.length > 0) selectRep(reps[0].id);

// ── SIDEBAR ───────────────────────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('repList');
  if (reps.length === 0) {
    list.innerHTML = '<div style="padding:12px 10px;font-size:0.75rem;color:#4b5563">Nenhum repertório ainda.</div>';
    return;
  }
  list.innerHTML = reps.map(r => `
    <div class="rep-item ${r.id === activeRepId ? 'active' : ''}" onclick="selectRep('${r.id}')">
      <span class="rep-item-name">${esc(r.name)}</span>
      <span class="rep-item-count">${r.songs.length}</span>
      <button class="rep-item-del" onclick="deleteRep(event,'${r.id}')" title="Excluir repertório">✕</button>
    </div>
  `).join('');
}

// ── SELECIONAR REPERTÓRIO ─────────────────────────────────────────────
function selectRep(id) {
  activeRepId = id;
  renderSidebar();
  renderDetail();
}

// ── DETALHE ───────────────────────────────────────────────────────────
function renderDetail() {
  const rep = reps.find(r => r.id === activeRepId);
  document.getElementById('emptyState').style.display = rep ? 'none' : 'flex';
  const detail = document.getElementById('repDetail');
  if (!rep) { detail.style.display = 'none'; return; }
  detail.style.display = 'block';

  const songs = rep.songs.map(id => songMap[id]).filter(Boolean);

  const listHtml = songs.length === 0
    ? '<div class="rep-empty">Nenhuma música ainda.<br>Clique em "+ Adicionar músicas".</div>'
    : `<ol class="song-list" id="songList">${songs.map((s, i) => `
        <li class="song-row" draggable="true" data-id="${esc(s.id)}">
          <span class="drag-handle" title="Arrastar para reordenar">⠿</span>
          <span class="song-row-num">${i + 1}</span>
          <div class="song-row-info">
            <a class="song-row-title" href="${esc(s.file)}">${esc(s.title)}</a>
            <div class="song-row-artist">${esc(s.artist)}</div>
          </div>
          <span class="song-row-key">${esc(s.key)}</span>
          <button class="btn-rem" onclick="removeSong('${esc(s.id)}')" title="Remover do repertório">✕</button>
        </li>`).join('')}
      </ol>`;

  detail.innerHTML = `
    <div class="rep-header">
      <div class="rep-name-wrap">
        <div class="rep-name" onclick="openRenameModal('${rep.id}')">
          ${esc(rep.name)} <span class="edit-icon">✏</span>
        </div>
        <div class="rep-meta">${songs.length} música${songs.length !== 1 ? 's' : ''}</div>
      </div>
      <button class="btn-add-song" onclick="openAddModal()">+ Adicionar músicas</button>
    </div>
    ${listHtml}
  `;

  if (songs.length > 0) bindDragAndDrop();
}

// ── DRAG AND DROP ─────────────────────────────────────────────────────
let saveTimer = null;

function bindDragAndDrop() {
  const list = document.getElementById('songList');
  if (!list) return;
  let dragged = null;

  list.addEventListener('dragstart', e => {
    const row = e.target.closest('.song-row');
    if (!row) return;
    dragged = row;
    setTimeout(() => row.classList.add('dragging'), 0);
    e.dataTransfer.effectAllowed = 'move';
  });

  list.addEventListener('dragend', () => {
    if (dragged) dragged.classList.remove('dragging');
    list.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    dragged = null;
  });

  list.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const row = e.target.closest('.song-row');
    if (!row || row === dragged) return;
    list.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    row.classList.add('drag-over');
  });

  list.addEventListener('dragleave', e => {
    const row = e.target.closest('.song-row');
    if (row) row.classList.remove('drag-over');
  });

  list.addEventListener('drop', e => {
    e.preventDefault();
    const target = e.target.closest('.song-row');
    if (!target || !dragged || target === dragged) return;
    target.classList.remove('drag-over');

    // Reorder DOM
    const rows = [...list.querySelectorAll('.song-row')];
    const fromIdx = rows.indexOf(dragged);
    const toIdx   = rows.indexOf(target);
    if (fromIdx < toIdx) target.after(dragged);
    else target.before(dragged);

    // Update numbers
    [...list.querySelectorAll('.song-row')].forEach((r, i) => {
      const num = r.querySelector('.song-row-num');
      if (num) num.textContent = i + 1;
    });

    // Persist after 1.5s debounce
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => persistOrder(list), 1500);
  });
}

function persistOrder(list) {
  const rep = reps.find(r => r.id === activeRepId);
  if (!rep) return;
  const newOrder = [...list.querySelectorAll('.song-row')].map(r => r.dataset.id);
  rep.songs = newOrder;
  saveReps(reps);
  renderSidebar(); // atualiza contagem
}

// ── REMOVER MÚSICA ────────────────────────────────────────────────────
function removeSong(songId) {
  const rep = reps.find(r => r.id === activeRepId);
  if (!rep) return;
  rep.songs = rep.songs.filter(id => id !== songId);
  saveReps(reps);
  renderDetail();
  renderSidebar();
}

// ── EXCLUIR REPERTÓRIO ────────────────────────────────────────────────
function deleteRep(e, id) {
  e.stopPropagation();
  const rep = reps.find(r => r.id === id);
  if (!rep) return;
  if (!confirm(`Excluir o repertório "${rep.name}"?`)) return;
  reps = reps.filter(r => r.id !== id);
  saveReps(reps);
  if (activeRepId === id) {
    activeRepId = reps.length > 0 ? reps[0].id : null;
  }
  renderSidebar();
  renderDetail();
}

// ── MODAL NOME ────────────────────────────────────────────────────────
function openNewRepModal() {
  nameModalMode = 'new';
  nameModalRepId = null;
  document.getElementById('modalNameTitle').textContent = 'Novo repertório';
  document.getElementById('repNameInput').value = '';
  document.getElementById('overlayName').classList.add('open');
  setTimeout(() => document.getElementById('repNameInput').focus(), 60);
}

function openRenameModal(id) {
  const rep = reps.find(r => r.id === id);
  if (!rep) return;
  nameModalMode = 'rename';
  nameModalRepId = id;
  document.getElementById('modalNameTitle').textContent = 'Renomear';
  document.getElementById('repNameInput').value = rep.name;
  document.getElementById('overlayName').classList.add('open');
  setTimeout(() => {
    const inp = document.getElementById('repNameInput');
    inp.focus(); inp.select();
  }, 60);
}

function closeNameModal() {
  document.getElementById('overlayName').classList.remove('open');
}

function confirmNameModal() {
  const name = document.getElementById('repNameInput').value.trim();
  if (!name) return;
  if (nameModalMode === 'new') {
    const rep = { id: genId(), name, songs: [] };
    reps.push(rep);
    saveReps(reps);
    closeNameModal();
    selectRep(rep.id);
  } else if (nameModalMode === 'rename') {
    const rep = reps.find(r => r.id === nameModalRepId);
    if (rep) { rep.name = name; saveReps(reps); }
    closeNameModal();
    renderSidebar();
    renderDetail();
  }
}

// ── MODAL ADICIONAR ───────────────────────────────────────────────────
function openAddModal() {
  document.getElementById('addSearch').value = '';
  document.getElementById('overlayAdd').classList.add('open');
  renderAddList();
  setTimeout(() => document.getElementById('addSearch').focus(), 60);
}

function closeAddModal() {
  document.getElementById('overlayAdd').classList.remove('open');
}

function renderAddList() {
  const rep = reps.find(r => r.id === activeRepId);
  if (!rep) return;
  const q = document.getElementById('addSearch').value.trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '');

  const sorted = SONGS.slice().sort((a, b) =>
    a.artist.localeCompare(b.artist, 'pt') || a.title.localeCompare(b.title, 'pt')
  );

  const filtered = q
    ? sorted.filter(s => {
        const hay = (s.artist + ' ' + s.title).toLowerCase()
          .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        return hay.includes(q);
      })
    : sorted;

  if (filtered.length === 0) {
    document.getElementById('addList').innerHTML =
      '<div style="padding:20px;text-align:center;color:#4b5563;font-size:0.82rem">Nenhuma música encontrada</div>';
    return;
  }

  document.getElementById('addList').innerHTML = filtered.map(s => {
    const already = rep.songs.includes(s.id);
    return `
      <div class="modal-song-item ${already ? 'already' : ''}" onclick="${already ? '' : `addSong('${s.id}')`}">
        <div class="modal-song-info">
          <div class="modal-song-title">${esc(s.title)}</div>
          <div class="modal-song-artist">${esc(s.artist)}</div>
        </div>
        <span class="modal-song-key">${esc(s.key)}</span>
        ${already
          ? '<span style="font-size:0.68rem;color:#6b7280;flex-shrink:0">já adicionada</span>'
          : `<button class="modal-add-btn" onclick="event.stopPropagation();addSong('${s.id}')">+ Add</button>`
        }
      </div>
    `;
  }).join('');
}

function addSong(songId) {
  const rep = reps.find(r => r.id === activeRepId);
  if (!rep || rep.songs.includes(songId)) return;
  rep.songs.push(songId);
  saveReps(reps);
  renderAddList();   // atualiza modal (mostra "já adicionada")
  renderDetail();
  renderSidebar();
}

// ── FECHAR COM ESC / CLICK FORA ───────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeNameModal(); closeAddModal(); }
});
document.getElementById('overlayName').addEventListener('click', function(e) {
  if (e.target === this) closeNameModal();
});
document.getElementById('overlayAdd').addEventListener('click', function(e) {
  if (e.target === this) closeAddModal();
});

// ── UTILITÁRIO ────────────────────────────────────────────────────────
function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
