<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cifras — Igreja</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111827; color:#f9fafb; font-family:Georgia,serif; padding:20px 5% 60px; max-width:640px; margin:0 auto; }
h1 { font-size:1.3rem; color:#fbbf24; margin-bottom:4px; }
p.sub { font-size:0.8rem; color:#9ca3af; margin-bottom:24px; }
.artist { margin:20px 0 8px; padding-bottom:6px; border-bottom:1px solid rgba(255,255,255,0.09); }
.artist h2 { font-size:0.9rem; color:#f9fafb; letter-spacing:0.04em; text-transform:uppercase; }
.card { display:block; text-decoration:none; background:#1f2937; border:1px solid rgba(255,255,255,0.07); border-left:4px solid #fbbf24; border-radius:10px; padding:14px 16px; margin-bottom:12px; transition:background 0.15s; }
.card:active { background:#263044; }
.card h3 { font-size:1rem; color:#fbbf24; margin-bottom:3px; }
.card p { font-size:0.78rem; color:#9ca3af; font-family:'Courier New',monospace; }
</style>
</head>
<body>
<h1>🎸 Cifras</h1>
<p class="sub">Selecione a música por artista</p>

<div id="song-list"></div>

<script src="database/songs.js"></script>
<script>
(function () {
  var songs = window.SONGS || [];

  // Agrupa por artista mantendo a ordem de primeira aparição
  var artistOrder = [];
  var byArtist = {};
  songs.forEach(function (s) {
    if (!byArtist[s.artist]) {
      byArtist[s.artist] = [];
      artistOrder.push(s.artist);
    }
    byArtist[s.artist].push(s);
  });

  var html = '';
  artistOrder.forEach(function (artist) {
    html += '<section class="artist"><h2>' + escHtml(artist) + '</h2></section>';
    byArtist[artist].forEach(function (s) {
      html += '<a class="card" href="' + escHtml(s.file) + '">'
            + '<h3>' + escHtml(s.title) + '</h3>'
            + '<p>Tom: ' + escHtml(s.key) + '</p>'
            + '</a>';
    });
  });

  document.getElementById('song-list').innerHTML = html;

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
})();
</script>
</body>
</html>
