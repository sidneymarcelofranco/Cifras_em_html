<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#111827;
  color:#f9fafb;
  font-family:Georgia,serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:0 6%;
}

.logo {
  text-align:center;
  margin-bottom:52px;
}

.logo h1 {
  font-size:1.1rem;
  color:#fbbf24;
  letter-spacing:0.18em;
  text-transform:uppercase;
}

.logo hr {
  border:none;
  border-top:1px solid rgba(251,191,36,0.25);
  margin:14px auto;
  width:40px;
}

.logo p {
  font-size:0.7rem;
  color:#4b5563;
  font-family:'Courier New',monospace;
  letter-spacing:0.08em;
}

.cards {
  display:flex;
  flex-direction:column;
  gap:12px;
  width:100%;
  max-width:380px;
}

.nav-card {
  display:flex;
  align-items:center;
  gap:16px;
  text-decoration:none;
  background:#1f2937;
  border:1px solid rgba(255,255,255,0.06);
  border-radius:14px;
  padding:20px 18px;
  transition:background 0.15s;
}

.nav-card:hover,
.nav-card:active {
  background:#263044;
}

.nav-card-icon {
  font-size:1.5rem;
  flex-shrink:0;
  width:36px;
  text-align:center;
  opacity:0.85;
}

.nav-card-body { flex:1; min-width:0; }

.nav-card-title {
  font-size:0.88rem;
  color:#f9fafb;
  letter-spacing:0.05em;
  text-transform:uppercase;
}

.nav-card-desc {
  font-size:0.7rem;
  color:#6b7280;
  font-family:'Courier New',monospace;
  margin-top:3px;
}

.nav-card-arrow {
  color:#374151;
  font-size:1.1rem;
  flex-shrink:0;
}
</style>
</head>
<body>

<div class="logo">
  <h1>Portal</h1>
  <hr>
  <p>Louvor &amp; Palavra</p>
</div>

<div class="cards">

  <a class="nav-card" href="cifras.html">
    <span class="nav-card-icon">🎸</span>
    <div class="nav-card-body">
      <div class="nav-card-title">Cifras</div>
      <div class="nav-card-desc">Acervo de músicas e acordes</div>
    </div>
    <span class="nav-card-arrow">›</span>
  </a>

  <a class="nav-card" href="pregacao.html">
    <span class="nav-card-icon">📖</span>
    <div class="nav-card-body">
      <div class="nav-card-title">Palavra</div>
      <div class="nav-card-desc">Pregações e mensagens</div>
    </div>
    <span class="nav-card-arrow">›</span>
  </a>

</div>

</body>
</html>
